name: Publish Windows Release

# Windows companion to publish.yml. Same trigger shape, same release the
# macOS jobs target — tauri-action merges this runner's Windows entry into
# the same latest.json so the in-app updater sees both platforms on every
# tagged release. preflight mirrors publish.yml: tag/version match, secret
# presence, and the curated release-notes body from `bun run release:notes`.

on:
  workflow_dispatch:
    inputs:
      draft:
        description: "Create the GitHub release as a draft"
        required: false
        default: true
        type: boolean
  push:
    tags:
      - "v*"

concurrency:
  group: publish-windows-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CI: true

jobs:
  preflight:
    name: Release Preflight
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      release_body: ${{ steps.notes.outputs.release_body }}
      draft: ${{ steps.release-mode.outputs.draft }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup JS toolchain
        uses: ./.github/actions/setup-js
        with:
          install-sccache: "false"

      - name: Verify release config
        run: |
          bun run release:verify
          test -n "${HELMOR_UPDATER_PUBKEY}"
          test -n "${HELMOR_UPDATER_ENDPOINTS}"
          test -n "${TAURI_SIGNING_PRIVATE_KEY}"
        env:
          HELMOR_UPDATER_PUBKEY: ${{ secrets.HELMOR_UPDATER_PUBKEY }}
          HELMOR_UPDATER_ENDPOINTS: ${{ secrets.HELMOR_UPDATER_ENDPOINTS }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Read version
        id: version
        run: |
          version=$(node -p "require('./package.json').version")
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Validate pushed tag matches app version
        if: github.ref_type == 'tag'
        run: |
          expected="v${{ steps.version.outputs.version }}"
          if [ "${GITHUB_REF_NAME}" != "${expected}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match app version ${expected}"
            exit 1
          fi

      - name: Extract release notes
        id: notes
        run: |
          {
            echo 'release_body<<EOF'
            bun run release:notes -- "${{ steps.version.outputs.version }}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Resolve release mode
        id: release-mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "draft=${{ inputs.draft }}" >> "$GITHUB_OUTPUT"
          else
            echo "draft=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-publish:
    name: Build and Publish (x86_64-pc-windows-msvc)
    needs: preflight
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      # src-tauri/.cargo/config.toml sets rustc-wrapper = "sccache" for the
      # macOS jobs; Windows runners don't install it, so clear the wrapper.
      RUSTC_WRAPPER: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup JS toolchain
        uses: ./.github/actions/setup-js
        with:
          install-sccache: "false"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # boring-sys2 (transitive native dep) assembles with NASM on Windows.
      - name: Setup NASM
        uses: ilammy/setup-nasm@v1

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: windows-tauri-v1
          workspaces: src-tauri -> target

      # tauri-action's beforeBuildCommand runs prepare-sidecar.mjs, which
      # stages the win32 vendor tree, builds the bun sidecar + helmor-cli,
      # then bundles. NSIS only — WiX/MSI is not part of what this fork
      # ships. includeUpdaterJson merges the Windows entry into the same
      # latest.json the macOS jobs write on this release.
      - name: Build and publish (Windows NSIS)
        id: tauri
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          HELMOR_UPDATER_PUBKEY: ${{ secrets.HELMOR_UPDATER_PUBKEY }}
          HELMOR_UPDATER_ENDPOINTS: ${{ secrets.HELMOR_UPDATER_ENDPOINTS }}
        with:
          tagName: v__VERSION__
          releaseName: Helmor v__VERSION__
          releaseBody: ${{ needs.preflight.outputs.release_body }}
          releaseDraft: ${{ needs.preflight.outputs.draft == 'true' }}
          prerelease: false
          includeUpdaterJson: true
          args: --bundles nsis
          tauriScript: bun run tauri
